services:
  app:
    build:
      context: ../..
      dockerfile: docker/production/php/Dockerfile
    image: shams-print-crm-php:production
    restart: unless-stopped
    env_file:
      - ../../.env.production
    environment:
      APP_ENV: ${APP_ENV:-production}
      DB_HOST: mysql
      REDIS_HOST: redis
    volumes:
      - app_storage:/var/www/html/storage
      - app_cache:/var/www/html/bootstrap/cache
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - shams_internal
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ../..:/var/www/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - app_storage:/var/www/html/storage:ro
      - app_cache:/var/www/html/bootstrap/cache:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - shams_internal
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  queue:
    build:
      context: ../..
      dockerfile: docker/production/php/Dockerfile
    image: shams-print-crm-php:production
    restart: unless-stopped
    command: php artisan queue:work
    env_file:
      - ../../.env.production
    environment:
      APP_ENV: ${APP_ENV:-production}
      DB_HOST: mysql
      REDIS_HOST: redis
    volumes:
      - app_storage:/var/www/html/storage
      - app_cache:/var/www/html/bootstrap/cache
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
    networks:
      - shams_internal

  scheduler:
    build:
      context: ../..
      dockerfile: docker/production/php/Dockerfile
    image: shams-print-crm-php:production
    restart: unless-stopped
    command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
    env_file:
      - ../../.env.production
    environment:
      APP_ENV: ${APP_ENV:-production}
      DB_HOST: mysql
      REDIS_HOST: redis
    volumes:
      - app_storage:/var/www/html/storage
      - app_cache:/var/www/html/bootstrap/cache
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
    networks:
      - shams_internal

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-shams_print_crm}
      MYSQL_USER: ${DB_USERNAME:-shams}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_production_data:/var/lib/mysql
    networks:
      - shams_internal
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\""]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis_production_data:/data
    networks:
      - shams_internal
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  shams_internal:
    driver: bridge

volumes:
  app_storage:
  app_cache:
  mysql_production_data:
  redis_production_data:
